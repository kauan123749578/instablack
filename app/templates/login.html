<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar · instablack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=3" />
</head>
<body class="login-body">
  <div class="ambient-grid"></div>
  <canvas class="login-rays" id="login-rays"></canvas>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">ib</div>
      <span class="login-brand-text">instablack</span>
    </div>
    <span class="login-badge">Acesso privado</span>
    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Painel exclusivo de automação e publicação. Entre com suas credenciais.</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="/login">
      <label>Usuário
        <input type="text" name="username" required autofocus autocomplete="username" placeholder="seu usuário">
      </label>
      <label>Senha
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </label>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;padding:14px">Entrar no painel</button>
    </form>

    {% if allow_registration %}
    <p class="login-footer">Sem convite? <a href="/register">Solicitar acesso</a></p>
    {% endif %}
  </div>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
