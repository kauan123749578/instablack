<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar · Reels Scheduler</title>
  <link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body class="login-body">
  <div class="ambient-grid"></div>
  <canvas class="login-rays" id="login-rays"></canvas>

  <div class="login-card">
    <h1>Reels Scheduler</h1>
    <p class="subtitle">Entre com seu usuário e senha</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="/login">
      <label>Usuário
        <input type="text" name="username" required autofocus autocomplete="username">
      </label>
      <label>Senha
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px">Entrar</button>
    </form>

    {% if allow_registration %}
    <p class="login-footer">Não tem conta? <a href="/register">Criar agora</a></p>
    {% endif %}
  </div>

  <script src="/static/app.js?v=2"></script>
</body>
</html>
