{% extends "base.html" %}
{% block title %}Story Link Studio{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/story-studio.css?v=4" />
{% endblock %}
{% block content %}
<div class="studio-app mode-custom" id="studioShell">
  <section class="studio-workspace">
    <div class="phone-shell">
      <div class="story-canvas" id="canvas">
        <img id="storyImage" alt="">
        <div class="empty-state" id="emptyState">Escolha uma foto</div>
        <div class="sticker default selected" id="sticker" hidden>
          <svg class="sticker-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9.5 13.5 10.9 12.1C12.4 10.6 14.8 10.6 16.3 12.1L17.7 13.5C19.2 15 19.2 17.4 17.7 18.9 16.2 20.4 13.8 20.4 12.3 18.9L11.5 18.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M14.5 10.5 13.1 11.9C11.6 13.4 9.2 13.4 7.7 11.9L6.3 10.5C4.8 9 4.8 6.6 6.3 5.1 7.8 3.6 10.2 3.6 11.7 5.1L12.5 5.9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="sticker-text" id="stickerText">GOOGLE.COM</span>
          <span class="handle" id="resizeHandle"></span>
        </div>
      </div>
    </div>
  </section>

  <section class="studio-editor">
    <nav class="studio-tabs" role="tablist">
      <button type="button" class="studio-tab active" data-tab="general" role="tab">General</button>
      <button type="button" class="studio-tab" data-tab="link" role="tab">Link</button>
    </nav>

    <div class="studio-tab-panel active" id="tab-general" role="tabpanel">
      <div class="field">
        <label for="accountInput">Conta</label>
        <select id="accountInput" required>
          <option value="">Selecione…</option>
          {% for acc in accounts %}
          {% set flag = cookie_flags.get(acc.id, {}) %}
          <option value="{{ acc.id }}">
            @{{ acc.username }}{% if acc.provider == 'meta' %} · API oficial{% elif flag.has_csrftoken %} · Cookies web{% endif %}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="imageInput">Foto</label>
        <label class="file-drop">
          <input id="imageInput" type="file" accept="image/jpeg,image/png,image/webp" hidden>
          <span id="fileDropLabel">Clique ou arraste a foto</span>
        </label>
      </div>
      <div class="field">
        <label for="fitInput">Ajuste da foto</label>
        <select id="fitInput">
          <option value="contain">Foto inteira</option>
          <option value="cover">Preencher tela</option>
        </select>
      </div>
      <div class="field">
        <label for="modeInput">Modo</label>
        <select id="modeInput">
          <option value="custom" selected>Botão desenhado (recomendado)</option>
          <option value="native">Sticker nativo do Instagram</option>
        </select>
      </div>
      <div class="field custom-only" id="sizeField">
        <label for="sizeInput">Tamanho <span id="sizeValue">100%</span></label>
        <input id="sizeInput" type="range" min="70" max="140" value="100">
      </div>
      <div class="field custom-only" id="rotationField">
        <label for="rotationInput">Rotação <span id="rotationValue">0°</span></label>
        <input id="rotationInput" type="range" min="-180" max="180" value="0">
      </div>
    </div>

    <div class="studio-tab-panel" id="tab-link" role="tabpanel">
      <div class="field">
        <label for="urlInput">URL</label>
        <div class="input-with-action">
          <input id="urlInput" value="https://google.com" autocomplete="off">
          <button type="button" class="icon-btn" id="clearUrl" title="Limpar URL" aria-label="Limpar URL">
            <i data-lucide="trash-2"></i>
          </button>
        </div>
      </div>
      <div class="field custom-only" id="textField">
        <label for="textInput">Sticker Text</label>
        <input id="textInput" value="GOOGLE.COM" maxlength="60">
      </div>
      <div class="field custom-only" id="variantField">
        <label for="variantInput">Sticker Style</label>
        <select id="variantInput">
          <option value="default">Default</option>
          <option value="white">White</option>
          <option value="rainbow">Rainbow</option>
          <option value="solid">Solid</option>
          <option value="brand">Opalite</option>
          <option value="black-text">Black Text</option>
          <option value="white-text">White Text</option>
        </select>
      </div>
    </div>
  </section>

  <aside class="studio-publish">
    <h3 class="publish-title">Publish Story</h3>
    <div class="publish-thumb" id="publishThumb">
      <span class="publish-thumb-empty">Prévia</span>
      <img id="publishThumbImg" alt="" hidden>
    </div>
    <button type="button" class="btn-studio secondary" id="renderButton">Prévia final</button>
    <button type="button" class="btn-studio primary" id="publishButton">PUBLISH</button>
    <div class="status" id="status"></div>
  </aside>
</div>

<dialog id="previewDialog">
  <img id="finalPreview" alt="Prévia final">
  <button type="button" class="btn-studio secondary" id="closePreview">Fechar</button>
</dialog>
{% endblock %}
{% block scripts %}
<script src="/static/story-studio.js?v=4"></script>
{% endblock %}
